name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Node.js (TypeScript/JavaScript) ──
  node:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f bun.lockb ]; then echo "manager=bun" >> $GITHUB_OUTPUT
          elif [ -f pnpm-lock.yaml ]; then echo "manager=pnpm" >> $GITHUB_OUTPUT
          elif [ -f yarn.lock ]; then echo "manager=yarn" >> $GITHUB_OUTPUT
          else echo "manager=npm" >> $GITHUB_OUTPUT; fi

      - uses: actions/setup-node@v4
        if: steps.pm.outputs.manager != 'bun'
        with:
          node-version: ${{ matrix.node-version }}

      - uses: oven-sh/setup-bun@v2
        if: steps.pm.outputs.manager == 'bun'

      - uses: pnpm/action-setup@v4
        if: steps.pm.outputs.manager == 'pnpm'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
            ~/.bun/install/cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml', '**/bun.lockb', '**/yarn.lock') }}

      - name: Install
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            bun) bun install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            *) npm ci ;;
          esac

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Lint
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm lint || true ;;
            bun) bun run lint || true ;;
            *) npm run lint || true ;;
          esac

      - name: Test
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm test ;;
            bun) bun test ;;
            *) npm test ;;
          esac

      - name: Build
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm build || true ;;
            bun) bun run build || true ;;
            *) npm run build || true ;;
          esac

  # ── Python ──
  python:
    if: hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

      - name: Install
        run: |
          pip install --upgrade pip
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e "."; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint
        run: |
          pip install ruff
          ruff check . || true

      - name: Type check
        run: |
          pip install mypy
          mypy . --ignore-missing-imports || true

      - name: Test
        run: python -m pytest -v || true

  # ── Go ──
  go:
    if: hashFiles('go.mod') != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race ./...

      - name: Build
        run: go build ./...

  # ── Java ──
  java:
    if: hashFiles('pom.xml') != '' || hashFiles('build.gradle*') != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17, 21]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Cache Maven
        if: hashFiles('pom.xml') != ''
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Maven build + test
        if: hashFiles('pom.xml') != ''
        run: mvn verify -B

      - name: Gradle build + test
        if: hashFiles('build.gradle*') != ''
        run: ./gradlew build
